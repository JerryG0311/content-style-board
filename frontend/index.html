<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Content Style Board</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: #f6f6fb;
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 14px 16px;
        background: white;
        border-bottom: 1px solid #e6e6ef;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        flex: 0 0 auto;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      input { flex: 1; padding: 10px 12px; border: 1px solid #e6e6ef; border-radius: 10px; }
      #nicheInput, #seedInput {
        flex: 0 1 320px;
        min-width: 220px;
      }

      header strong {
        flex: 0 0 auto;
      }
      button { padding: 10px 12px; border: 1px solid #e6e6ef; background: white; border-radius: 10px; cursor: pointer; }
      main {
        flex: 1 1 auto;
        min-height: 0;
        min-width: 0;
        padding: 0;
        display: flex;
        overflow: hidden;
      }

      .workspace {
        flex: 1 1 auto;
        width: 100%;
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        overflow: hidden;
      }

      .analysis-panel {
        width: 360px;
        min-width: 360px;
        max-width: 360px;
        background: #ffffff;
        border-left: 1px solid #e6e6ef;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        position: relative;
        z-index: 20;
        visibility: visible;
      }

      .analysis-panel-header {
        padding: 16px;
        border-bottom: 1px solid #e6e6ef;
      }

      .analysis-panel-header h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.2;
      }

      .analysis-panel-header p {
        margin: 6px 0 0;
        font-size: 13px;
        color: #666;
      }

      .analysis-panel-body {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .analysis-empty {
        border: 1px dashed #d8d8e6;
        background: #fafafe;
        border-radius: 14px;
        padding: 16px;
        color: #666;
        font-size: 14px;
        line-height: 1.5;
      }

      .analysis-card {
        border: 1px solid #ececf4;
        border-radius: 14px;
        background: #fff;
        overflow: hidden;
      }

      .analysis-preview {
        width: 100%;
        aspect-ratio: 9 / 16;
        background: #111;
        overflow: hidden;
      }

      .analysis-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .analysis-meta {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .analysis-title {
        margin: 0;
        font-size: 14px;
        line-height: 1.4;
        font-weight: 700;
        color: #111;
      }

      .analysis-subtle {
        font-size: 12px;
        color: #666;
      }

      .analysis-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .analysis-field {
        border: 1px solid #ececf4;
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }

      .analysis-label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #b4235a;
        margin-bottom: 6px;
      }

      .analysis-value {
        font-size: 14px;
        line-height: 1.5;
        color: #111;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .analysis-list {
        margin: 0;
        padding-left: 18px;
        color: #111;
      }

      .analysis-list li {
        margin: 0 0 6px;
        line-height: 1.5;
      }

      .tile.is-selected .tile-thumb {
        outline: 3px solid rgba(180, 35, 90, 0.28);
        outline-offset: 2px;
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: minmax(0, 1fr) 320px;
        }

        .analysis-panel {
          width: 320px;
          min-width: 320px;
          max-width: 320px;
        }
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
          height: auto;
          min-height: 100vh;
        }

        main {
          overflow: visible;
        }

        .workspace {
          display: flex;
          flex-direction: column;
          overflow: visible;
        }

        .board {
          min-height: 70vh;
        }

        .analysis-panel {
          width: 100%;
          min-width: 0;
          max-width: none;
          border-left: 0;
          border-top: 1px solid #e6e6ef;
        }
      }

      /* Viewport (the visible window under the header) */
      .board {
        position: relative;
        flex: 1 1 auto;
        width: auto;
        min-width: 0;
        height: 100%;
        overflow: hidden;
        background: #f7f8fc;
        user-select: none;
        cursor: grab;
      }

      /* The infinite canvas layer that moves/zooms */
      .canvas {
        position: absolute;
        inset: 0;
        transform-origin: 0 0;
        /* faint dot grid like poppy */
        background-color: #f7f8fc;
        background-image: radial-gradient(rgba(17, 17, 17, 0.10) 1px, transparent 1px);
        background-size: 22px 22px;
        background-position: 0 0;
      }

      /* Resize handles */
      .resize-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: rgba(180, 35, 90, 0.15);
        border: 1px solid rgba(180, 35, 90, 0.35);
        border-radius: 3px;
        z-index: 10;
      }
      .resize-handle:hover {
        background: rgba(180, 35, 90, 0.25);
      }
      .rh-nw { top: -5px; left: -5px; cursor: nwse-resize; }
      .rh-ne { top: -5px; right: -5px; cursor: nesw-resize; }
      .rh-sw { bottom: -5px; left: -5px; cursor: nesw-resize; }
      .rh-se { bottom: -5px; right: -5px; cursor: nwse-resize; }
      .rh-n  { top: -5px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
      .rh-s  { bottom: -5px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
      .rh-w  { left: -5px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
      .rh-e  { right: -5px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
      select {
        padding: 10px 12px;
        border: 1px solid #e6e6ef;
        border-radius: 10px;
        background: white;
      }

      /* --- Saved-card grid (Figma-style tiles) --- */
      .group-box-body {
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 14px;
        align-items: start;
      }

      .group-empty {
        grid-column: 1 / -1;
        border: 1px dashed #f3b6cd;
        border-radius: 16px;
        background: #fff7fb;
        color: #9c2c58;
        padding: 14px 16px;
        font-size: 13px;
        line-height: 1.5;
      }

      .group-status {
        grid-column: 1 / -1;
        border: 1px solid #e7e4f6;
        border-radius: 14px;
        background: #f8f7fe;
        color: #4d4a73;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
      }

      .tile {
        position: relative;
        display: block;
        text-decoration: none;
        background: transparent;
        cursor: pointer;
        border: none;
      }

      .tile-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .tile-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #f1c4d6;
        background: #fff6fa;
        color: #b4235a;
        font-size: 12px;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .tile-pill .ig-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: #ff4da6;
        flex: 0 0 auto;
      }

      .tile-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }

      .icon-btn {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        border: 1px solid #f1c4d6;
        background: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        color: #b4235a;
      }

      .icon-btn:hover {
        background: #fff6fa;
      }

      .tile-thumb {
        width: 100%;
        aspect-ratio: 9 / 16;
        border-radius: 16px;
        overflow: hidden;
        background: #111;
        box-shadow: 0 10px 24px rgba(0,0,0,0.15);
        border: 1px solid #e6e6ef;
        pointer-events: none;
      }

      .tile-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }

      .tile-thumb iframe {
        border: 0;
        display: block;
        background: #111;
      }

      /* Cleaner Instagram embeds (reduce extra whitespace + make it feel like a native card) */
      .ig-embed-wrap {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        pointer-events: none;
      }

      /* Instagram's embed iframe often has extra padding; scale it slightly to fill the tile */
      .ig-embed {
        width: 115%;
        height: 115%;
        transform: scale(0.87);
        transform-origin: 0 0;
        pointer-events: none;
      }

      .ig-embed-fallback {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 12px;
        text-align: center;
        padding: 14px;
        background: #111;
      }

      .tile-fallback {
        width: 100%;
        aspect-ratio: 9 / 16;
        border-radius: 16px;
        border: 1px dashed #d6d6e6;
        background: #fbfbff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 12px;
        text-align: center;
        padding: 10px;
      }

      /* Slightly wider boxes so the grid feels like your reference */
      .group-box {
        width: 520px !important;
      }

      @media (max-width: 980px) {
        .group-box { width: 92vw !important; }
        .group-box-body { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
      }

  <body>
    <header>
  <strong>Content Style Board</strong>

  <input
    id="nicheInput"
    type="text"
    placeholder="Niche (e.g. fitness, real estate, amazon wholesale)"
  />

  <input
    id="seedInput"
    type="text"
    placeholder="Seed account (optional, e.g. @creator)"
  />

  <select id="platformSelect">
    <option value="instagram">Instagram</option>
    <option value="tiktok">TikTok</option>
    <option value="x">X</option>
  </select>

  <select id="styleSelect"></select>

  <button id="searchBtn">Search</button>
  <button id="classifyBtn">Classify Reels</button>
  <button id="saveBtn">Save</button>
    </header>
    <!-- Main workspace: board on the left, analysis panel pinned on the right -->

    <main>
      <div class="workspace">
        <div id="board" class="board">
          <div id="canvas" class="canvas">Board loading…</div>
        </div>

        <aside id="analysisPanel" class="analysis-panel">
          <div class="analysis-panel-header">
            <h2>Post Analysis</h2>
            <p>Select a post card to view its saved analysis.</p>
          </div>
          <div id="analysisPanelBody" class="analysis-panel-body">
            <div class="analysis-empty">
              Click any post card on the board to load its analysis.
              <br /><br />
              If that post has not been analyzed yet, you will see an empty state here instead.
            </div>
          </div>
        </aside>
      </div>
    </main>
    <script>
  const boardEl = document.getElementById("board");
  const canvasEl = document.getElementById("canvas");
  const searchBtn = document.getElementById("searchBtn");
  const nicheInput = document.getElementById("nicheInput");
  const seedInput = document.getElementById("seedInput");
  const analysisPanelBody = document.getElementById("analysisPanelBody");
  const analysisPanel = document.getElementById("analysisPanel");
  const headerEl = document.querySelector("header");

  window.addEventListener("load", () => {
    console.log("UI boot", {
      headerFound: !!headerEl,
      analysisPanelFound: !!analysisPanel,
      analysisPanelBodyFound: !!analysisPanelBody,
      headerHeight: headerEl ? headerEl.offsetHeight : 0,
      analysisPanelWidth: analysisPanel ? analysisPanel.offsetWidth : 0,
      boardWidth: boardEl ? boardEl.offsetWidth : 0,
      windowWidth: window.innerWidth,
    });
  });

  const STYLE_OPTIONS = {
  instagram: [
    { value: "carousel", label: "Carousel" },
    { value: "multi-clip", label: "Multi-clip text reel" },
    { value: "single-clip", label: "Single-clip text reel" },
    { value: "talking-head", label: "Talking-head reel" },
  ],
  tiktok: [
    { value: "multi-clip", label: "Multi-clip text reel" },
    { value: "single-clip", label: "Single-clip text reel" },
    { value: "talking-head", label: "Talking-head reel" },
  ],
  x: [
    { value: "post", label: "Post (short)" },
    { value: "thread", label: "Thread" },
  ],
};

  let nextX = 24;
  let nextY = 24;
  let selectedTile = null;

  // --- Infinite canvas (pan + zoom) ---
  let viewportX = 0;
  let viewportY = 0;
  let viewportScale = 1;
  const MIN_SCALE = 0.25;
  const MAX_SCALE = 2.5;

  function clamp(n, a, b) {
    return Math.max(a, Math.min(b, n));
  }

  function applyViewport() {
    canvasEl.style.transform = `translate(${viewportX}px, ${viewportY}px) scale(${viewportScale})`;
  }

  function clientToWorld(clientX, clientY) {
    const rect = boardEl.getBoundingClientRect();
    const x = (clientX - rect.left - viewportX) / viewportScale;
    const y = (clientY - rect.top - viewportY) / viewportScale;
    return { x, y };
  }

  function zoomAt(clientX, clientY, zoomFactor) {
    const rect = boardEl.getBoundingClientRect();
    const before = clientToWorld(clientX, clientY);

    const nextScale = clamp(viewportScale * zoomFactor, MIN_SCALE, MAX_SCALE);
    viewportScale = nextScale;

    // keep the point under the cursor stable
    const afterX = before.x * viewportScale + rect.left + viewportX;
    const afterY = before.y * viewportScale + rect.top + viewportY;
    viewportX += (clientX - afterX);
    viewportY += (clientY - afterY);

    applyViewport();
  }


  let isPanning = false;
  let panStartX = 0;
  let panStartY = 0;
  let panOrigX = 0;
  let panOrigY = 0;

  boardEl.addEventListener("mousedown", (e) => {
    // Left-drag on empty canvas pans. Middle mouse pans anywhere.
    const middle = e.button === 1;
    const left = e.button === 0;

    // If left-click started inside a group box or resize handle, do NOT pan (let drag/resize happen)
    if (left && e.target.closest && (e.target.closest(".group-box") || e.target.closest(".resize-handle"))) {
      return;
    }

    if (!middle && !left) return;

    isPanning = true;
    boardEl.style.cursor = "grabbing";
    panStartX = e.clientX;
    panStartY = e.clientY;
    panOrigX = viewportX;
    panOrigY = viewportY;
    e.preventDefault();
  });

  window.addEventListener("mousemove", (e) => {
    if (!isPanning) return;
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    viewportX = panOrigX + dx;
    viewportY = panOrigY + dy;
    applyViewport();
  });

  window.addEventListener("mouseup", () => {
    if (!isPanning) return;
    isPanning = false;
    boardEl.style.cursor = "grab";
  });

  // Wheel / trackpad:
  // - Ctrl/Cmd + wheel = zoom
  // - Normal wheel/2-finger scroll = pan
  boardEl.addEventListener(
    "wheel",
    (e) => {
      // Zoom
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const direction = e.deltaY > 0 ? 0.9 : 1.1;
        zoomAt(e.clientX, e.clientY, direction);
        return;
      }

      // Pan (trackpad two-finger scroll)
      e.preventDefault();
      viewportX -= e.deltaX;
      viewportY -= e.deltaY;
      applyViewport();
    },
    { passive: false }
  );

  // Start at default viewport
  applyViewport();
  boardEl.style.cursor = "grab";

  function makeDraggable(box, handle) {
    let isDragging = false;
    let startX = 0, startY = 0;
    let origLeft = 0, origTop = 0;

    handle.style.cursor = "grab";
    boardEl.style.cursor = "grab";

    handle.addEventListener("mousedown", (e) => {
      if (isPanning) return;
      isDragging = true;
      handle.style.cursor = "grabbing";
      startX = e.clientX;
      startY = e.clientY;

      const rect = box.getBoundingClientRect();
      // Convert current screen position to world coords
      const p = clientToWorld(rect.left, rect.top);
      origLeft = p.x;
      origTop = p.y;

      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      const dx = (e.clientX - startX) / viewportScale;
      const dy = (e.clientY - startY) / viewportScale;
      box.style.left = `${origLeft + dx}px`;
      box.style.top = `${origTop + dy}px`;
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
      handle.style.cursor = "grab";
      boardEl.style.cursor = "grab";
    });
  }

  function makeResizable(box) {
    const minW = 320;
    const minH = 220;

    const handles = [
      { cls: "resize-handle rh-nw", edge: "nw" },
      { cls: "resize-handle rh-ne", edge: "ne" },
      { cls: "resize-handle rh-sw", edge: "sw" },
      { cls: "resize-handle rh-se", edge: "se" },
      { cls: "resize-handle rh-n", edge: "n" },
      { cls: "resize-handle rh-s", edge: "s" },
      { cls: "resize-handle rh-w", edge: "w" },
      { cls: "resize-handle rh-e", edge: "e" },
    ];

    for (const h of handles) {
      const el = document.createElement("div");
      el.className = h.cls;
      el.dataset.edge = h.edge;
      box.appendChild(el);

      let resizing = false;
      let startX = 0;
      let startY = 0;
      let startW = 0;
      let startH = 0;
      let startL = 0;
      let startT = 0;

      el.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();
        resizing = true;

        startX = e.clientX;
        startY = e.clientY;
        startW = box.getBoundingClientRect().width;
        startH = box.getBoundingClientRect().height;

        // left/top are in world coords
        startL = parseFloat(box.style.left || "0");
        startT = parseFloat(box.style.top || "0");

        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp, { once: true });
      });

      function onMove(e) {
        if (!resizing) return;
        const dx = (e.clientX - startX) / viewportScale;
        const dy = (e.clientY - startY) / viewportScale;

        // size math based on which handle is dragged
        const edge = h.edge;
        let newW = startW / viewportScale;
        let newH = startH / viewportScale;
        let newL = startL;
        let newT = startT;

        // startW/startH are in screen pixels; convert to world units
        const startWWorld = startW / viewportScale;
        const startHWorld = startH / viewportScale;

        newW = startWWorld;
        newH = startHWorld;

        if (edge.includes("e")) newW = startWWorld + dx;
        if (edge.includes("s")) newH = startHWorld + dy;
        if (edge.includes("w")) {
          newW = startWWorld - dx;
          newL = startL + dx;
        }
        if (edge.includes("n")) {
          newH = startHWorld - dy;
          newT = startT + dy;
        }

        // clamp
        if (newW < minW) {
          if (edge.includes("w")) newL -= (minW - newW);
          newW = minW;
        }
        if (newH < minH) {
          if (edge.includes("n")) newT -= (minH - newH);
          newH = minH;
        }

        box.style.width = `${newW}px`;
        box.style.height = `${newH}px`;
        box.style.left = `${newL}px`;
        box.style.top = `${newT}px`;
      }

      function onUp() {
        resizing = false;
        window.removeEventListener("mousemove", onMove);
      }
    }
  }

  const platformSelect = document.getElementById("platformSelect");

// populate once on load (so it's correct even after refresh)
populateStylesForPlatform(platformSelect.value);

// update whenever platform changes
platformSelect.addEventListener("change", () => {
  populateStylesForPlatform(platformSelect.value);
});


  function createGroupBox(query, results, id, emptyMessage = "", statusText = "") {
    const box = document.createElement("div");
    box.dataset.id = id || crypto.randomUUID();
    box.dataset.query = query;
    box.dataset.results = JSON.stringify(results);
    box.style.position = "absolute";
    box.style.left = `${nextX}px`;
    box.style.top = `${nextY}px`;
    box.style.width = "360px";
    box.style.background = "white";
    box.style.border = "1px solid #e6e6ef";
    box.style.borderRadius = "14px";
    box.style.boxShadow = "0 12px 30px rgba(0,0,0,0.10)";
    box.style.overflow = "hidden";
    box.className = "group-box";

    nextX += 30;
    nextY += 20;
    if (nextX > 400) nextX = 24;
    if (nextY > 250) nextY = 24;

    const header = document.createElement("div");
    header.style.padding = "10px 12px";
    header.style.background = "#fafafe";
    header.style.borderBottom = "1px solid #e6e6ef";
    header.style.display = "flex";
    header.style.justifyContent = "space-between";
    header.style.alignItems = "center";

    const title = document.createElement("div");
    title.textContent = query || "Results";
    title.style.fontWeight = "700";
    title.style.fontSize = "14px";

    const headerRight = document.createElement("div");
    headerRight.style.display = "inline-flex";
    headerRight.style.alignItems = "center";
    headerRight.style.gap = "8px";

    const count = document.createElement("div");
    count.textContent = `${results.length}`;
    count.style.fontSize = "12px";
    count.style.opacity = "0.7";
    count.className = "count";

    const delBoxBtn = document.createElement("button");

          u.search = "";

          if (u.pathname.includes("/embed")) {

  async function classifyVisibleReels(options = {}) {
    const {
      platform = document.getElementById("platformSelect").value,
      niche = nicheInput.value.trim(),
      style = document.getElementById("styleSelect").value,
      limit = 6,
      fps = 1.0,
    } = options;

    const params = new URLSearchParams({
      platform,
      niche,
      style,
      limit: String(limit),
      fps: String(fps),
    });

    const classifyRes = await fetch(`/api/classify/reels/true_visual?${params.toString()}`, {
      method: "POST",
    });
    const classifyData = await classifyRes.json();
    console.log("Frontend true visual classification result:", classifyData);
    return classifyData;
  }

  async function autoClassifySubtypeResults(platform, style, niche) {
    const normalizedStyle = (style || "").trim().toLowerCase();
    if (!["single-clip", "multi-clip", "talking-head"].includes(normalizedStyle)) {
      return { ok: true, updated: 0, skipped: true };
    }
    return classifyVisibleReels({
      platform,
      niche,
      style,
      limit: 18,
      fps: 1.0,
    });
  }

async function runSearch(options = {}) {
  const { allowAutoClassify = true, loadingBox: existingLoadingBox = null } = options;
  const platform = document.getElementById("platformSelect").value;
  const style = document.getElementById("styleSelect").value;

  const niche = nicheInput.value.trim();
  const seed = seedInput.value.trim();

  if (!niche) {
    alert("Please enter a niche first.");
    return;
  }

  // Create loading box immediately (this is the per-search Saved box)
  const label = `Saved: ${platform} • ${style} • ${niche}`;
  const loadingBox = existingLoadingBox || createGroupBox(
    label,
    [],
    undefined,
    "Preparing results…",
    "Searching saved local results…"
  );
  if (!existingLoadingBox) {
    canvasEl.appendChild(loadingBox);
  } else {
    setGroupBoxStatus(loadingBox, "Searching saved local results…", "Preparing results…");
  }

  try {
    const params = new URLSearchParams({
      platform,
      style,
      niche,
      best: "1",
    });

    if (seed) params.append("seed", seed);

    const res = await fetch(`/api/search?${params.toString()}`);
    const data = await res.json();

    const results = Array.isArray(data.results) ? data.results : [];

    if (!results.length && data.notice && allowAutoClassify) {
      setGroupBoxStatus(
        loadingBox,
        "No classified matches yet. Running true visual classification on candidate reels…",
        data.notice || "No saved results for this search yet."
      );
      const classifyData = await autoClassifySubtypeResults(platform, style, niche);
      if ((classifyData?.attempted || 0) > 0) {
        setGroupBoxStatus(
          loadingBox,
          `Visually inspected ${classifyData.attempted} reel(s). Refreshing search results…`,
          ""
        );
        return runSearch({ allowAutoClassify: false, loadingBox });
      }
      if (Array.isArray(classifyData?.errors) && classifyData.errors.length) {
        setGroupBoxStatus(
          loadingBox,
          `True visual classification finished with ${classifyData.errors.length} issue(s).`,
          data.notice || "No saved results for this search yet."
        );
      }
    }

    loadingBox.remove();

    // Create a single per-search Saved box
    let finalEmptyMessage = data.notice || "";
    if (!results.length && !allowAutoClassify && ["single-clip", "multi-clip", "talking-head"].includes((style || "").trim().toLowerCase())) {
      finalEmptyMessage = `True visual classification finished, but no ${style} results were found for '${niche}'.`;
    }

    const group = createGroupBox(
      `Saved: ${data.platform} • ${data.style} • ${niche}`,
      results,
      undefined,
      finalEmptyMessage
    );
    canvasEl.appendChild(group);

  } catch (err) {
    console.error(err);
    loadingBox.remove();
    alert("Search failed. Check console.");
  }
}

async function saveBoard() {
  const boxes = Array.from(canvasEl.querySelectorAll(".group-box")).map((el) => {
    return {
      id: el.dataset.id,
      x: parseInt(el.style.left || "0", 10),
      y: parseInt(el.style.top || "0", 10),
      query: el.dataset.query,
      results: JSON.parse(el.dataset.results || "[]"),
    };
  });

  const payload = { board: boxes };

  const res = await fetch("/api/board/save", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (!res.ok) throw new Error("Save failed");
  console.log("Board saved");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function renderAnalysisEmpty(message) {
  analysisPanelBody.innerHTML = `
    <div class="analysis-empty">${escapeHtml(message)}</div>
  `;
}

function renderAnalysisFields(analysis) {
  const orderedFields = [
    ["hook_text", "Hook"],
    ["hook_type", "Hook Type"],
    ["content_angle", "Content Angle"],
    ["creator_intent", "Creator Intent"],
    ["cta_type", "CTA Type"],
    ["voice_style", "Voice Style"],
    ["structure_type", "Structure"],
    ["pain_point", "Pain Point"],
    ["audience_type", "Audience"],
    ["rewriteable_takeaway", "Rewriteable Takeaway"],
  ];

  const fieldsHtml = [];

  for (const [key, label] of orderedFields) {
    const value = analysis?.[key];
    if (!value) continue;

    fieldsHtml.push(`
      <div class="analysis-field">
        <span class="analysis-label">${escapeHtml(label)}</span>
        <div class="analysis-value">${escapeHtml(value)}</div>
      </div>
    `);
  }

  if (Array.isArray(analysis?.why_it_works) && analysis.why_it_works.length) {
    fieldsHtml.push(`
      <div class="analysis-field">
        <span class="analysis-label">Why This Works</span>
        <ul class="analysis-list">
          ${analysis.why_it_works.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
        </ul>
      </div>
    `);
  }

  if (!fieldsHtml.length) {
    fieldsHtml.push(`
      <div class="analysis-empty">This post has an analysis record, but no analysis fields were filled yet.</div>
    `);
  }

  return fieldsHtml.join("");
}

function renderAnalysisPanel(tile, analysis) {
  const title = tile.dataset.title || "Untitled post";
  const accountHandle = tile.dataset.accountHandle || "Unknown account";
  const niche = tile.dataset.niche || "";
  const thumbnail = tile.dataset.thumbnail || tile.dataset.previewUrl || "";
  const rawPostUrl = (tile.dataset.postUrl || "").trim();
  const postUrl = (() => {
    try {
      const u = new URL(rawPostUrl);
      const match = u.pathname.match(/\/(p|reel|reels)\/([A-Za-z0-9_-]+)\/?/i);
      if (!match) return rawPostUrl;
      const kind = match[1].toLowerCase() === "reels" ? "reel" : match[1].toLowerCase();
      return `https://www.instagram.com/${kind}/${match[2]}/`;
    } catch (e) {
      return rawPostUrl;
    }
  })();

  const isInstagram = postUrl.includes("instagram.com");
  const embedPreviewUrl = isInstagram
    ? (() => {
        try {
          const base = tile.dataset.embedUrl || postUrl;
          const u = new URL(base);
          const match = u.pathname.match(/\/(p|reel|reels)\/([A-Za-z0-9_-]+)\/?/i);
          if (!match) return postUrl.endsWith("/") ? `${postUrl}embed/` : `${postUrl}/embed/`;
          const kind = match[1].toLowerCase() === "reels" ? "reel" : match[1].toLowerCase();
          return `https://www.instagram.com/${kind}/${match[2]}/embed/`;
        } catch (e) {
          return postUrl.endsWith("/") ? `${postUrl}embed/` : `${postUrl}/embed/`;
        }
      })()
    : (tile.dataset.embedUrl || "");

  const previewHtml = thumbnail && !thumbnail.includes("/embed/")
    ? `
      <img
        src="/api/proxy?url=${encodeURIComponent(thumbnail)}"
        alt="${escapeHtml(title)}"
        onerror="if(this.dataset.rawTried==='1'){${embedPreviewUrl ? `this.outerHTML='${`<iframe class=&quot;ig-embed&quot; src=&quot;${escapeHtml(embedPreviewUrl)}&quot; title=&quot;${escapeHtml(title)}&quot; loading=&quot;lazy&quot; scrolling=&quot;no&quot;></iframe>`}'.replace(/'/g, "&#39;")};` : `this.outerHTML='<div class=&quot;analysis-empty&quot; style=&quot;margin:0;border:0;border-radius:0;height:100%;display:flex;align-items:center;justify-content:center;&quot;>No preview available.</div>';`}return;} this.dataset.rawTried='1'; this.src='${escapeHtml(thumbnail).replace(/'/g, "&#39;")}'"
      />
    `
    : (embedPreviewUrl
        ? `<iframe class="ig-embed" src="${escapeHtml(embedPreviewUrl)}" title="${escapeHtml(title)}" loading="lazy" scrolling="no"></iframe>`
        : `<div class="analysis-empty" style="margin: 0; border: 0; border-radius: 0; height: 100%; display: flex; align-items: center; justify-content: center;">No preview available.</div>`);

  analysisPanelBody.innerHTML = `
    <div class="analysis-card">
      <div class="analysis-preview">${previewHtml}</div>
      <div class="analysis-meta">
        <h3 class="analysis-title">${escapeHtml(title)}</h3>
        <div class="analysis-subtle">${escapeHtml(accountHandle)}${niche ? ` • ${escapeHtml(niche)}` : ""}</div>
        ${postUrl ? `<a class="analysis-subtle" href="${escapeHtml(postUrl)}" target="_blank" rel="noreferrer">Open original post</a>` : ""}
      </div>
    </div>

    <div class="analysis-grid">
      ${renderAnalysisFields(analysis)}
    </div>
  `;
}

async function fetchStoredAnalysis(tile) {
  const postId = (tile.dataset.postId || "").trim();
  const postUrl = (tile.dataset.postUrl || "").trim();

  const getAttempts = [];
  const postAttempts = [];

  if (postId) {
    getAttempts.push(`/api/post_analysis/${encodeURIComponent(postId)}`);
    getAttempts.push(`/api/post_analysis?post_id=${encodeURIComponent(postId)}`);
    getAttempts.push(`/api/analyze/post?post_id=${encodeURIComponent(postId)}`);

    postAttempts.push({
      url: "/api/analyze/post",
      body: { post_id: Number(postId) || postId },
    });
  }

  if (postUrl) {
    getAttempts.push(`/api/post_analysis?post_url=${encodeURIComponent(postUrl)}`);
    getAttempts.push(`/api/analyze/post?post_url=${encodeURIComponent(postUrl)}`);

    postAttempts.push({
      url: "/api/analyze/post",
      body: { post_url: postUrl },
    });
  }

  console.log("[analysis] lookup start", {
    postId,
    postUrl,
    getAttempts,
    postAttempts,
  });

  for (const url of getAttempts) {
    try {
      const res = await fetch(url);
      const text = await res.text();

      console.log("[analysis] GET attempt", {
        url,
        status: res.status,
        ok: res.ok,
        bodyPreview: text.slice(0, 300),
      });

      if (!res.ok || !text) continue;

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        continue;
      }

      if (!data) continue;
      if (data.analysis) return data.analysis;
      if (data.post_analysis) return data.post_analysis;
      if (data.result) return data.result;
      if (data.hook_text || data.content_angle || data.creator_intent) return data;
    } catch (err) {
      console.warn("[analysis] GET attempt failed", url, err);
    }
  }

  for (const attempt of postAttempts) {
    try {
      const res = await fetch(attempt.url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(attempt.body),
      });

      const text = await res.text();

      console.log("[analysis] POST attempt", {
        url: attempt.url,
        requestBody: attempt.body,
        status: res.status,
        ok: res.ok,
        bodyPreview: text.slice(0, 300),
      });

      if (!res.ok || !text) continue;

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        continue;
      }

      if (!data) continue;
      if (data.analysis) return data.analysis;
      if (data.post_analysis) return data.post_analysis;
      if (data.result) return data.result;
      if (data.hook_text || data.content_angle || data.creator_intent) return data;
    } catch (err) {
      console.warn("[analysis] POST attempt failed", attempt, err);
    }
  }

  return null;
}

async function loadAnalysisForTile(tile) {
  const debugMeta = {
    title: tile.dataset.title || "",
    postId: (tile.dataset.postId || "").trim(),
    postUrl: (tile.dataset.postUrl || "").trim(),
    accountHandle: tile.dataset.accountHandle || "",
  };

  console.log("[analysis] selected tile", debugMeta);
  renderAnalysisEmpty("Loading analysis...");

  try {
    const analysis = await fetchStoredAnalysis(tile);

    if (!analysis) {
      renderAnalysisEmpty(
        `No stored analysis exists for this post yet.\n\nPost ID: ${debugMeta.postId || "missing"}\nURL: ${debugMeta.postUrl || "missing"}`
      );
      return;
    }

    console.log("[analysis] loaded analysis", analysis);
    renderAnalysisPanel(tile, analysis);
  } catch (err) {
    console.error("Failed to load post analysis:", err);
    renderAnalysisEmpty("Failed to load analysis for this post.");
  }
}

async function loadBoard() {
  try {
    const res = await fetch("/api/board/load");
    const payload = await res.json();

    // Clear board
    canvasEl.innerHTML = "";

    // payload.board might be:
    // - an array (new format)
    // - an object like { boxes: [...] } or { board: [...] } (legacy mistakes)
    let items = payload.board || [];
    if (!Array.isArray(items)) {
      items = items.board || items.boxes || [];
    }

    for (const item of items) {
      // NEW format (what we want): { id, x, y, query, results: [...] }
      let query = item.query;
      let results = item.results;

      // LEGACY format (from earlier test): { id, x, y, title, url, platform, style }
      if (!query && item.platform && item.style && item.title && item.url) {
        query = `${item.platform} • ${item.style}`;
        results = [
          {
            title: item.title,
            url: item.url,
            platform: item.platform,
            tag: item.style,
          },
        ];
      }

      // If still no usable data, skip it (prevents empty boxes forever)
      if (!query && (!results || results.length === 0)) continue;

      const box = createGroupBox(query, results || [], item.id);

      // restore id + position
      box.style.left = `${item.x ?? 24}px`;
      box.style.top = `${item.y ?? 24}px`;

      canvasEl.appendChild(box);
    }

    // Cleanup legacy "Saved Results" box from older versions
    for (const el of Array.from(canvasEl.querySelectorAll(".group-box"))) {
      const q = (el.dataset.query || "").toLowerCase();
      if (q.includes("saved results")) {
        el.remove();
      }
    }

    // Empty state
    if (canvasEl.querySelectorAll(".group-box").length === 0) {
      canvasEl.innerHTML = "<div style=\"padding:24px;color:#666;font-size:14px;\">No saved board yet. Run a search, drag boxes around, then hit Save.</div>";
    }
  } catch (err) {
    console.error("Load failed:", err);
    canvasEl.textContent = "Failed to load saved board. Check console.";
  }
}

saveBtn.addEventListener("click", () => {
  saveBoard().catch((err) => {
    console.error(err);
    alert("Save failed. Check console.");
  });
});

classifyBtn.addEventListener("click", async () => {
  const originalLabel = classifyBtn.textContent;
  try {
    classifyBtn.disabled = true;
    classifyBtn.textContent = "Classifying…";
    const result = await classifyVisibleReels();
    console.log("Classify button result:", result);
    alert(`True visual classification finished. Updated ${result?.updated || 0} reel(s).`);
  } catch (err) {
    console.error(err);
    alert("True visual classification failed. Check console.");
  } finally {
    classifyBtn.disabled = false;
    classifyBtn.textContent = originalLabel;
  }
});

// Load saved board ONCE on startup. While it loads, disable Search so we don't
// render boxes that then get wiped by loadBoard() clearing the board.
searchBtn.disabled = true;
searchBtn.style.opacity = "0.6";
searchBtn.style.cursor = "not-allowed";

const boardReady = loadBoard().finally(() => {
  searchBtn.disabled = false;
  searchBtn.style.opacity = "1";
  searchBtn.style.cursor = "pointer";
});

// One click handler only
searchBtn.addEventListener("click", async () => {
  await boardReady;
  canvasEl.innerHTML = "";
  runSearch();
});
